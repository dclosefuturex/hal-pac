<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>Neon Serpent · HAL Arcade</title>
  <style>
    *{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#02050a;color:#fff;font-family:Inter,system-ui,sans-serif;touch-action:none}canvas{display:block;width:100%;height:100%}
    .top{position:fixed;z-index:3;inset:14px 14px auto;display:flex;justify-content:space-between;pointer-events:none}.back{pointer-events:auto;color:#bdffe6;text-decoration:none;padding:9px 14px;border:1px solid #64ffc633;border-radius:99px;background:#03110ddb;font:800 11px ui-monospace,monospace;letter-spacing:1px}.hud{text-align:right;padding:9px 12px;border:1px solid #ffffff1d;border-radius:13px;background:#02090ddd;font:700 10px ui-monospace,monospace;letter-spacing:1px}.hud strong{color:#6dffc5;font-size:19px}.hud .combo{color:#ffda62}.boost{width:150px;height:5px;margin:5px 0 0 auto;background:#ffffff18;border-radius:5px;overflow:hidden}.boost i{display:block;width:100%;height:100%;background:linear-gradient(90deg,#5bffbe,#d6ff6b);box-shadow:0 0 9px #5bffbe}
    .panel{position:fixed;z-index:4;inset:0;display:grid;place-items:center;padding:22px;background:radial-gradient(circle at 50% 40%,#063b3088,#010408f3);text-align:center}.card{width:min(680px,100%)}.kicker{color:#66ffc6;font:900 11px ui-monospace,monospace;letter-spacing:4px}h1{font-size:clamp(55px,13vw,112px);line-height:.78;letter-spacing:-7px;font-style:italic;margin:20px 0 27px;text-shadow:0 0 40px #32ffae55}h1 span{display:block;color:#6dffc5}.card p{max-width:600px;margin:0 auto 22px;color:#a5c8be;line-height:1.55}.start{border:0;border-radius:99px;padding:15px 28px;background:#6dffc5;color:#04100c;font-weight:950;letter-spacing:2px;cursor:pointer;box-shadow:0 10px 45px #5bffc855}.help{font:11px ui-monospace,monospace;color:#64877d!important}
    .mobile{position:fixed;z-index:3;inset:auto 12px 12px;display:none;justify-content:space-between;align-items:end;pointer-events:none}.pad{display:grid;grid-template-columns:54px 54px 54px;grid-template-rows:54px 54px;gap:5px}.mobile button{pointer-events:auto;border:1px solid #ffffff32;background:#051912dd;color:#fff;font-size:20px;font-weight:900;border-radius:14px}.pad [data-dir="up"]{grid-column:2}.pad [data-dir="left"]{grid-row:2}.pad [data-dir="down"]{grid-row:2;grid-column:2}.pad [data-dir="right"]{grid-row:2;grid-column:3}.dash{width:82px;height:82px!important;border-radius:50%!important;background:#b5ff3f!important;color:#071006!important;font-size:11px!important;letter-spacing:1px}
    @media(pointer:coarse),(max-width:800px){.mobile{display:flex}.help{display:none}.hud{font-size:8px}.hud strong{font-size:15px}.boost{width:110px}h1{letter-spacing:-4px}}
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div class="top"><a class="back" href="index.html">← ARCADE</a><div class="hud">SCORE <strong id="score">0</strong> &nbsp; BEST <span id="best">0</span><div><span class="combo" id="combo">COMBO x1</span> · LENGTH <span id="length">4</span></div><div class="boost"><i id="boost"></i></div></div></div>
  <div class="panel" id="panel"><div class="card"><div class="kicker">GAME 007 · EVOLVED SNAKE</div><h1>NEON<span>SERPENT</span></h1><p>Hunt living energy through a shifting cyber-garden. Chain meals, bend through portals, steal strange powers, and do not trust the grid.</p><button class="start" id="start">ENTER THE GARDEN</button><p class="help">ARROWS / WASD STEER · SPACE BOOST · P PAUSE · SWIPE ON MOBILE</p></div></div>
  <div class="mobile"><div class="pad"><button data-dir="up">↑</button><button data-dir="left">←</button><button data-dir="down">↓</button><button data-dir="right">→</button></div><button class="dash" id="dash">BOOST</button></div>
  <script src="neon-serpent.js?v=1"></script>
</body></html>
