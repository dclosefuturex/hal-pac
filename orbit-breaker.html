<style>*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;background:#03040c;color:#fff;font-family:ui-monospace,SFMono-Regular,monospace;touch-action:none}.shell{height:100%;display:flex;flex-direction:column;align-items:center;background:radial-gradient(circle at 50% 45%,#25124c,#080918 46%,#020308)}header{height:72px;width:min(100%,500px);display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex:none}.brand{font:900 20px system-ui;letter-spacing:-1px}.brand i{color:#64f4ff;font-style:normal}.back{color:#71809f;text-decoration:none;font-size:11px;letter-spacing:2px}.hud{position:absolute;z-index:3;top:78px;width:min(100%,500px);display:grid;grid-template-columns:repeat(3,1fr);padding:0 15px;pointer-events:none}.stat{text-align:center;color:#72809b;font-size:9px;letter-spacing:1px}.stat b{display:block;color:#fff;font-size:18px;margin-top:3px}.stage{position:relative;flex:1;width:min(100%,500px);min-height:0;overflow:hidden;border-radius:24px 24px 0 0;border:1px solid #ffffff18;border-bottom:0;box-shadow:0 0 70px #51208d44}canvas{width:100%;height:100%;display:block}.overlay{position:absolute;inset:0;z-index:5;display:grid;place-items:center;background:#03040cbb;backdrop-filter:blur(8px);padding:35px;text-align:center}.overlay.hidden{opacity:0;pointer-events:none}.card .kicker{color:#67efff;font-size:10px;letter-spacing:4px}.card h1{font:900 clamp(46px,14vw,74px)/.82 system-ui;letter-spacing:-5px;margin:15px 0 22px}.card h1 span{display:block;color:transparent;-webkit-text-stroke:1px #bc5bff}.card p{color:#a5b1c9;font-size:13px;line-height:1.65}.card button{margin-top:15px;border:0;border-radius:99px;background:#fff;color:#080913;padding:15px 30px;font:bold 15px inherit;box-shadow:0 0 35px #64eaff66}.tip{position:absolute;bottom:18px;z-index:4;font-size:10px;letter-spacing:2px;color:#7e8ba5;pointer-events:none}.flash{position:absolute;inset:0;z-index:2;pointer-events:none;opacity:0;background:#fff}.flash.go{animation:flas
