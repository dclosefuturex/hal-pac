<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>HAL-PAC</title>
  <style>
    :root{--yellow:#ffd928;--blue:#174cff;--ink:#05060c;--cyan:#35e5ff;--pink:#ff6bb5}
    *{box-sizing:border-box}html,body{margin:0;min-height:100%;background:radial-gradient(circle at 50% 20%,#131a35 0,#070913 45%,#020307 100%);color:#fff;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;overscroll-behavior:none}
    body{display:grid;place-items:center;padding:14px}.shell{width:min(96vw,600px);text-align:center}.brand{display:flex;align-items:end;justify-content:space-between;margin:0 auto 8px;width:min(100%,532px)}
    h1{font:900 clamp(25px,7vw,43px)/.9 system-ui;margin:0;color:var(--yellow);letter-spacing:-2px;text-shadow:0 3px 0 #e79000,0 0 20px #ffd92877}.tag{font-size:11px;color:#94a3c8;letter-spacing:2px}
    .hud{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;width:min(100%,532px);margin:auto auto 7px}.stat{background:#0c1020;border:1px solid #29345c;border-radius:8px;padding:6px 4px;font-size:11px;color:#93a4cb}.stat b{display:block;color:#fff;font-size:17px;margin-top:1px}
    .stage{position:relative;width:min(100%,532px);aspect-ratio:28/31;margin:auto;border-radius:12px;overflow:hidden;box-shadow:0 0 0 2px #151e48,0 16px 50px #000}canvas{display:block;width:100%;height:100%;background:#000;touch-action:none}
    .overlay{position:absolute;inset:0;display:grid;place-items:center;background:#000b;backdrop-filter:blur(3px);padding:30px;transition:.2s}.overlay.hidden{opacity:0;pointer-events:none}.card h2{font:900 clamp(30px,9vw,54px)/1 system-ui;margin:0 0 10px;color:var(--yellow)}.card p{color:#cbd5e1;line-height:1.5;font-size:13px}.card button{border:0;border-radius:99px;background:var(--yellow);color:#151000;font:bold 16px inherit;padding:13px 25px;cursor:pointer;box-shadow:0 5px 0 #c27b00}.card button:active{transform:translateY(4px);box-shadow:0 1px 0 #c27b00}
    .controls{display:grid;grid-template-columns:52px 52px 52px;grid-template-rows:45px 45px;justify-content:center;gap:5px;margin-top:11px}.ctrl{border:1px solid #34406c;background:#12182d;color:#dbeafe;border-radius:11px;font-size:21px;touch-action:manipulation}.ctrl:active{background:#22346b}.up{grid-column:2}.left{grid-column:1;grid-row:2}.down{grid-column:2;grid-row:2}.right{grid-column:3;grid-row:2}.help{font-size:10px;color:#667499;margin:8px 0 0}
    @media(min-width:700px){.controls{display:none}.help{margin-top:11px}}
  </style>
</head>
<body><main class="shell">
  <div class="brand"><h1>HAL-PAC</h1><span class="tag">ONE MORE MAZE</span></div>
  <div class="hud"><div class="stat">SCORE<b id="score">0</b></div><div class="stat">HIGH SCORE<b id="high">0</b></div><div class="stat">LEVEL / LIVES<b><span id="level">1</span> / <span id="lives">3</span></b></div></div>
  <div class="stage"><canvas id="game" width="560" height="620"></canvas><div class="overlay" id="overlay"><div class="card"><h2 id="title">READY!</h2><p id="message">Eat every dot. Power pellets turn the tables.<br>Arrow keys, WASD, or swipe to move.</p><button id="start">PLAY</button></div></div></div>
  <div class="controls"><button class="ctrl up" data-dir="up">▲</button><button class="ctrl left" data-dir="left">◀</button><button class="ctrl down" data-dir="down">▼</button><button class="ctrl right" data-dir="right">▶</button></div>
  <p class="help">ARROWS / WASD · P TO PAUSE · SOUND STARTS ON FIRST MOVE</p>
</main><script src="game.js"></script></body></html>
